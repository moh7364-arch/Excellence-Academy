<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تسجيل الدخول | AcademiaHub</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body class="auth-body"><div class="auth-wrapper"><div class="auth-card"><div class="auth-logo"><div class="auth-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div><h1>Academia<span>Hub</span></h1><p>سجّل فقط عند طلب الخدمة</p></div><div class="auth-tabs"><button class="auth-tab active" data-tab="login">تسجيل الدخول</button><button class="auth-tab" data-tab="register">حساب جديد</button></div><form class="auth-form active" id="loginForm"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required><input type="password" id="loginPassword" placeholder="كلمة المرور" required><button type="submit" class="auth-btn">دخول</button></form><form class="auth-form" id="registerForm"><div class="input-row"><input id="regFirstName" placeholder="الاسم الأول" required><input id="regLastName" placeholder="الاسم الأخير" required></div><input type="email" id="regEmail" placeholder="البريد الإلكتروني" required><select id="regLevel" required><option value="">المستوى الأكاديمي</option><option value="bachelor">بكالوريوس</option><option value="master">ماجستير</option><option value="phd">دكتوراه</option><option value="researcher">باحث</option></select><select id="regSpecialization" required><option value="">التخصص العام</option><option>الطب والعلوم الصحية</option><option>الهندسة والحاسوب</option><option>الإدارة والاقتصاد</option><option>القانون</option><option>العلوم الإنسانية والتربوية</option><option>العلوم الاجتماعية</option></select><input type="password" id="regPassword" placeholder="كلمة المرور" required minlength="8"><input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور" required><button type="submit" class="auth-btn">إنشاء حساب</button></form><div class="auth-msg" id="authMsg"></div><a href="index.html" class="back-home">العودة للرئيسية</a></div></div><script src="js/app.js"></script></body></html>
